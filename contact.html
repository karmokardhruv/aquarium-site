  <!-- 1) FONT-FACE -->

    @font-face {

    crossorigin="anonymous"
    referrerpolicy="no-referrer"

  <!-- ================== PAGE-SPECIFIC CSS for CONTACT PAGE ================== -->
  <style>

    body {
      background-color: #000;
    }

    html,
    body {
      min-height: 100%;
    }

    .page-wrapper {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .contact-container {
      flex: 1;
      background-color: #000;
      display: flex;
      justify-content: center;
      padding: 0 clamp(16px, 3vw, 24px) clamp(32px, 5vw, 48px);
    }

    .contact-inner {
      background:
        linear-gradient(rgba(0, 0, 0, 0.48), rgba(0, 0, 0, 0.65)),
        url("images/contact-background-night.jpg");
      background-size: cover;
      background-position: center center;
      width: min(100%, 1450px);
      min-height: clamp(520px, 72vh, 760px);
      border-radius: 28px;
      padding: clamp(48px, 8vw, 90px) clamp(20px, 5vw, 48px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .contact-inner h1 {
      font-size: clamp(2.2rem, 6vw, 2.8rem);
      font-weight: 700;
      color: #fff;
    }

    .contact-inner .intro-text {
      color: #ccc;
      font-size: 1.1rem;
      max-width: 560px;
      margin-top: 10px;
      margin-bottom: 36px;
      line-height: 1.65;
    }

    .contact-form {
      width: 100%;
      max-width: 560px;
    }

    .form-group {
      margin-bottom: 18px;
      text-align: left;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: #ccc;
      font-size: 0.9rem;
    }

    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 14px 16px;
      background-color: #fff;
      border: 1px solid #555;
      border-radius: 10px;
      font-family: "Product Sans", sans-serif;
      font-size: 1rem;
      color: #222;
    }

    .form-group textarea {
      min-height: 160px;
      resize: vertical;
    }

    .submit-btn {
      min-height: 52px;
      padding: 12px 36px;
      background-color: #ff5b00;
      color: #ffffff;
      border: none;
      border-radius: 999px;
      font-family: "Product Sans", sans-serif;
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
      box-shadow: 0 4px 14px rgba(255, 91, 0, 0.35);
    }

    .submit-btn:hover {
      background-color: #ff6a1a;
      box-shadow: 0 6px 20px rgba(255, 91, 0, 0.5);
      transform: translateY(-2px);
    }

    .submit-btn:active {
      transform: translateY(1px);
      box-shadow: 0 2px 8px rgba(255, 91, 0, 0.3);
    }

    /* --- LIGHT MODE SPECIFIC STYLES --- */
    body[data-theme="day"] {
      background-color: #f4f5f7;
    }

    body[data-theme="day"] .contact-container {
      background-color: #f4f5f7;
    }

    body[data-theme="day"] .contact-inner {
      background:
        linear-gradient(rgba(255, 255, 255, 0.15), rgba(255, 255, 255, 0.3)),
        url("images/contact-background-day.jpg");
      background-size: cover;
      background-position: center center;
    }

    body[data-theme="day"] .contact-inner h1 {
      color: #ffffff;
    }

    body[data-theme="day"] .contact-inner .intro-text {
      color: #e0d9d9;
    }

    body[data-theme="day"] .form-group label {
      color: #100f0f;
    }
    
    body[data-theme="day"] .form-group input,
    body[data-theme="day"] .form-group textarea {
      border: 1px solid #ccc;
      background-color: rgba(255, 255, 255, 0.85);
      color: #000;
    }

    body[data-theme="day"] .submit-btn {
      background-color: #277da1;
      box-shadow: 0 4px 14px rgba(39, 125, 161, 0.35);
    }

    body[data-theme="day"] .submit-btn:hover {
      background-color: #2e8baf;
      box-shadow: 0 6px 20px rgba(39, 125, 161, 0.5);
    }

    body[data-theme="day"] .submit-btn:active {
      box-shadow: 0 2px 8px rgba(39, 125, 161, 0.3);
    }

    @media (max-width: 767px) {
      .contact-container {
        padding: 0 12px 28px;
      }

      .contact-inner {
        min-height: auto;
        border-radius: 20px;
        padding: 36px 16px;
      }

      .contact-inner .intro-text {
        font-size: 1rem;
        margin-bottom: 28px;
      }

      .form-group input,
      .form-group textarea {
        font-size: 16px;
      }

      .submit-btn {
        width: 100%;
      }
    }
    
  </style>
</head>

<body>
  <script>
    (function() {
      var theme = localStorage.getItem('site-theme') || 'night';
      document.body.setAttribute('data-theme', theme);
    })();
  </script>
  <!-- This wrapper still creates the sidebars -->
  <div class="page-wrapper">

    <!-- HEADER -->
    <header class="site-header">
      <a href="index.html" class="logo">
        <img src="images/dhruv-logo.png" alt="Dhruv Karmokar" class="logo-img" onerror="this.style.display='none'; this.nextElementSibling.style.marginLeft='0';"/>
        <span class="logo-text">Dhruv Karmokar</span>
      </a>
      <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="site-nav" aria-label="Open navigation menu">
        <span class="nav-toggle-bar"></span>
        <span class="nav-toggle-bar"></span>
        <span class="nav-toggle-bar"></span>
      </button>
      <nav class="main-nav" id="site-nav" aria-label="Primary">
        <ul class="nav-links">
          <li class="nav-home"><a href="index.html">HOME</a></li>
          <li class="nav-projects"><a href="projects.html">PROJECTS</a></li>
          <li class="nav-publications"><a href="publications.html">PUBLICATIONS</a></li>
          <li class="nav-about"><a href="about.html">ABOUT</a></li>
          <li class="nav-resume"><a href="resume.html">RESUME</a></li>
          <li class="nav-contact"><a href="contact.html" class="active">CONTACT</a></li>
        </ul>
      </nav>
    </header>
    <button id="theme-btn" class="float-btn top-right" onclick="window.toggleTheme()" title="Toggle Day/Night">
      <i id="theme-icon" class="fa-solid fa-moon"></i>
    </button>

    <main class="contact-container">
      <div class="contact-inner">
        <h1>Contact</h1>
        <p class="intro-text">
          Feel free to send me an e-mail here! I check this e-mail regularly and should respond within a day or two.
        </p>

        <form class="contact-form" action="https://formspree.io/f/xpwrpebl" method="POST">
          <div class="form-group">
            <label for="name">Name *</label>
            <input type="text" id="name" name="name" placeholder="Your Name..." required>
          </div>

          <div class="form-group">
            <label for="email">Email Address *</label>
            <input type="email" id="email" name="email" placeholder="Your Email Address..." required>
          </div>

          <div class="form-group">
            <label for="subject">Subject</label>
            <input type="text" id="subject" name="subject" placeholder="E-mail subject">
          </div>

          <div class="form-group">
            <label for="message">Message *</label>
            <textarea id="message" name="message" placeholder="Your Message..." required></textarea>
          </div>

          <button type="submit" class="submit-btn">Send E-mail</button>
        </form>
      </div>
    </main>

  </div> <!-- End of page-wrapper -->

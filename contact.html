  <!-- ================== PAGE-SPECIFIC CSS for CONTACT PAGE ================== -->
  <style>

    body {
      background-color: #000;
    }

    html,
    body {
      min-height: 100%;
    }

    .page-wrapper {
      background-color: #121212;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .contact-container {
      flex: 1;
      background-color: #000;
      display: flex;
      justify-content: center;
      padding: 0 clamp(16px, 3vw, 24px) clamp(32px, 5vw, 48px);
    }

    .contact-inner {
      background:
        linear-gradient(rgba(0, 0, 0, 0.48), rgba(0, 0, 0, 0.65)),
        url("images/contact-background.jpg");
      background-size: cover;
      background-position: center center;
      width: min(100%, 1450px);
      min-height: clamp(520px, 72vh, 760px);
      border-radius: 28px;
      padding: clamp(48px, 8vw, 90px) clamp(20px, 5vw, 48px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .contact-inner h1 {
      font-size: clamp(2.2rem, 6vw, 2.8rem);
      font-weight: 700;
      color: #fff;
    }

    .contact-inner .intro-text {
      color: #ccc;
      font-size: 1.1rem;
      max-width: 560px;
      margin-top: 10px;
      margin-bottom: 36px;
      line-height: 1.65;
    }

    .contact-form {
      width: 100%;
      max-width: 560px;
    }

    .form-group {
      margin-bottom: 18px;
      text-align: left;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: #ccc;
      font-size: 0.9rem;
    }

    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 14px 16px;
      background-color: #fff;
      border: 1px solid #555;
      border-radius: 10px;
      font-family: "Product Sans", sans-serif;
      font-size: 1rem;
      color: #222;
    }

    .form-group textarea {
      min-height: 160px;
      resize: vertical;
    }

    .submit-btn {
      min-height: 48px;
      padding: 12px 30px;
      background-color: #333;
      color: #fff;
      border: 1px solid #555;
      border-radius: 999px;
      font-family: "Product Sans", sans-serif;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: background-color 0.2s, color 0.2s;
    }

    .submit-btn:hover {
      background-color: #fff;
      color: #000;
    }

    @media (max-width: 767px) {
      .contact-container {
        padding: 0 12px 28px;
      }

      .contact-inner {
        min-height: auto;
        border-radius: 20px;
        padding: 36px 16px;
      }

      .contact-inner .intro-text {
        font-size: 1rem;
        margin-bottom: 28px;
      }

      .form-group input,
      .form-group textarea {
        font-size: 16px;
      }

      .submit-btn {
        width: 100%;
      }
    }
    
  </style>

    <main class="contact-container">
      <div class="contact-inner">
        <h1>Contact</h1>
        <p class="intro-text">
          Feel free to send me an e-mail here! I check this e-mail regularly and should respond within a day or two.
        </p>

        <form class="contact-form" action="https://formspree.io/f/xpwrpebl" method="POST">
          <div class="form-group">
            <label for="name">Name *</label>
            <input type="text" id="name" name="name" placeholder="Your Name..." required>
          </div>

          <div class="form-group">
            <label for="email">Email Address *</label>
            <input type="email" id="email" name="email" placeholder="Your Email Address..." required>
          </div>

          <div class="form-group">
            <label for="subject">Subject</label>
            <input type="text" id="subject" name="subject" placeholder="E-mail subject">
          </div>

          <div class="form-group">
            <label for="message">Message *</label>
            <textarea id="message" name="message" placeholder="Your Message..." required></textarea>
          </div>

          <button type="submit" class="submit-btn">Send E-mail</button>
        </form>
      </div>

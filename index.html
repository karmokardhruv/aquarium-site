<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <!-- ====== FAVICON ====== -->
<link rel="apple-touch-icon" sizes="180x180" href="favicon_io/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="favicon_io/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon_io/favicon-16x16.png">
<link rel="shortcut icon" href="favicon_io/favicon.ico" type="image/x-icon">
<link rel="manifest" href="favicon_io/site.webmanifest">

  <!-- 1) FONT‐FACE: Product Sans (self‐hosted) -->
  <style>
    @font-face {
      font-family: "Product Sans";
      src: url("fonts/Product Sans Regular.ttf") format("truetype");
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: "Product Sans";
      src: url("fonts/Product Sans Bold.ttf") format("truetype");
      font-weight: 700;
      font-style: normal;
      font-display: swap;
    }
  </style>

  <!-- 2) LINK MAIN CSS -->
  <link rel="stylesheet" href="styles.css" />

  <!-- 3) FONT AWESOME (for LinkedIn & GitHub icons) -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
    crossorigin="anonymous"
    referrerpolicy="no-referrer"
  />
</head>

<body>
  <!-- =============== HEADER =============== -->
  <header class="site-header">
    <a href="index.html" class="logo">
      <img src="images/dhruv-logo.png" alt="Dhruv Karmokar" class="logo-img" onerror="this.style.display='none'; this.nextElementSibling.style.marginLeft='0';"/>
      <span class="logo-text">Dhruv Karmokar</span>
    </a>

    <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="site-nav" aria-label="Open navigation menu">
      <span class="nav-toggle-bar"></span>
      <span class="nav-toggle-bar"></span>
      <span class="nav-toggle-bar"></span>
    </button>

    <nav class="main-nav" id="site-nav" aria-label="Primary">
      <ul class="nav-links">
        <li class="nav-home"><a href="index.html" class="active">HOME</a></li>
        <li class="nav-projects"><a href="projects.html">PROJECTS</a></li>
        <li class="nav-publications"><a href="publications.html">PUBLICATIONS</a></li>
        <li class="nav-about"><a href="about.html">ABOUT</a></li>
        <li class="nav-resume"><a href="resume.html">RESUME</a></li>
        <li class="nav-contact"><a href="contact.html">CONTACT</a></li>
      </ul>
    </nav>
  </header>

  <!-- =============== FLOATING THEME TOGGLE =============== -->
  <button id="theme-btn" class="float-btn top-right" onclick="window.toggleTheme()" title="Toggle Day/Night">
    <i id="theme-icon" class="fa-solid fa-moon"></i>
  </button>

  <!-- =============== BACKGROUND VIDEOS =============== -->
  <div class="video-container">
    <video id="bg-video-day" src="Background/Day.mp4" autoplay loop muted playsinline class="bg-video"></video>
    <video id="bg-video-night" src="Background/Night.mp4" autoplay loop muted playsinline class="bg-video"></video>
  </div>

  <!-- =============== AQUARIUM CONTAINER =============== -->
  <div id="aquarium-container"></div>

  <!-- =============== FLOATING UI =============== -->

  <div class="bottom-right-controls">
    <button id="feed-btn" class="float-btn feed-btn" onclick="window.feedFish()" title="Feed Fish">
      <i class="fa-solid fa-fish"></i> Feed
    </button>
  </div>

  <!-- =============== FOOTER & SOCIALS =============== -->
  <div class="aquarium-footer-gradient"></div>
  <footer class="site-footer-bottom aquarium-footer">
    <div class="footer-icons">
      <a href="https://www.linkedin.com/in/karmokardhruv" target="_blank" aria-label="LinkedIn Profile"><i class="fa-brands fa-linkedin"></i></a>
      <a href="https://github.com/karmokardhruv" target="_blank" aria-label="GitHub Profile"><i class="fa-brands fa-github"></i></a>
      <a href="https://x.com/karmokardhruv" target="_blank" aria-label="X (Twitter) Profile"><i class="fa-brands fa-x-twitter"></i></a>
      <a href="https://instagram.com/karmokardhruv" target="_blank" aria-label="Instagram Profile"><i class="fa-brands fa-instagram"></i></a>
      <a href="https://www.youtube.com/@karmokardhruv" target="_blank" aria-label="YouTube Channel"><i class="fa-brands fa-youtube"></i></a>
    </div>
    <div class="footer-copy">Copyright © 2026 Dhruv Karmokar. All rights reserved</div>
  </footer>

  <!-- Load main.js for hamburger nav -->
  <script src="main.js?v=2"></script>
  <!-- Load Aquarium Logic -->
  <script type="module" src="aquarium.js"></script>

</body>
</html>

  <style>
    /* Theme overrides for Projects Page */
    body[data-theme="day"] {
      background-color: #f5f5f7;
      color: #111;
    }
    body[data-theme="day"] .projects-container h1 {
      color: #111 !important;
    }
    
    /* WIP Animation Styles */
    @keyframes dig {
      0% { transform: rotate(0deg) translateY(0); }
      25% { transform: rotate(-25deg) translateY(-5px); }
      50% { transform: rotate(10deg) translateY(2px); }
      75% { transform: rotate(-15deg) translateY(-3px); }
      100% { transform: rotate(0deg) translateY(0); }
    }
    
    @keyframes fadeUpWip {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .wip-icon {
      font-size: 5rem;
      color: #bf81ff; /* Accent color */
      animation: dig 1.5s infinite ease-in-out;
      margin-bottom: 20px;
      display: inline-block;
      transition: color 0.4s ease;
    }
    
    body[data-theme="day"] .wip-icon {
      color: #7b2cbf;
    }

    .wip-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 70vh;
      text-align: center;
      padding: 20px;
      animation: fadeUpWip 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .wip-container h1 {
      font-size: 3.5rem;
      font-weight: 700;
      margin-bottom: 15px;
      transition: color 0.4s ease;
    }

    .wip-container .subtitle {
      color: var(--text-secondary, #a1a1aa);
      font-size: 1.25rem;
      max-width: 650px;
      line-height: 1.6;
      font-style: italic;
      transition: color 0.4s ease;
    }
    
    body[data-theme="day"] .wip-container .subtitle {
      color: #555555;
    }
  </style>
</head>

<body>
  <script>

  <script>
    // Witty Text Randomizer
    document.addEventListener("DOMContentLoaded", () => {
      const wittyLines = [
        "Projects are currently marinating. Good things take time, and a lot of Stack Overflow.",
        "Currently fine-tuning the physics of a virtual fish tank. Real projects will surface once the fish are fed.",
        "Rome wasn't built in a day, and neither is this page. Mostly because I spent 4 hours choosing a font.",
        "404: Masterpieces not found... yet. The hamsters powering my servers are currently on a union break.",
        "Cooking up some code. Warning: May contain traces of spaghetti and misplaced semicolons.",
        "I'm currently busy breaking things locally before I push them to production. Stay tuned.",
        "Battling a rogue CSS flexbox. If I survive, the projects will appear here soon."
      ];

      const randomLine = wittyLines[Math.floor(Math.random() * wittyLines.length)];
      const textEl = document.getElementById("witty-text");
      if (textEl) {
        textEl.textContent = `"${randomLine}"`;
      }
    });
  </script>
